name: Docker Publish

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Green Agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/gaia-green-agents:latest
            ghcr.io/${{ github.repository_owner }}/gaia-green-agents:${{ github.sha }}

      - name: Build and push Purple Agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.purple
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/gaia-purple-agent:latest
            ghcr.io/${{ github.repository_owner }}/gaia-purple-agent:${{ github.sha }}
